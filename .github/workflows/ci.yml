name: Notebook CI

on: [pull_request, push]

jobs:
  parse-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          python -m pip install --upgrade pip
          pip install nbformat flake8
      - name: Notebook parse
        run: python -c "import nbformat, glob; [nbformat.read(open(p), as_version=4) for p in sorted(glob.glob('*.ipynb'))]; print('OK')"
      - name: Lint any .py
        run: |
          if compgen -G "*.py" > /dev/null; then flake8 *.py --max-line-length=120; else echo 'no .py at root'; fi
